            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 mt-5">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">Yönetici Girişi</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <div id="hataMesaji" class="alert alert-danger d-none text-center" role="alert">
                            Kullanıcı adı veya şifre hatalı!
                        </div>

                        <form action="login_islem.php" method="POST">
                            <div class="mb-3">
                                <label for="email" class="form-label">Öğrenci E-posta Adresi</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="Örn: b221210...@@sakarya.edu.tr" required>
                            </div>
                            <div class="mb-4">
                                <label for="sifre" class="form-label">Şifre (Öğrenci Numarası)</label>
                                <input type="password" class="form-control" id="sifre" name="sifre"  placeholder="Örn: b221210000" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Giriş Yap</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('hata') === '1') {
            document.getElementById('hataMesaji').classList.remove('d-none');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
