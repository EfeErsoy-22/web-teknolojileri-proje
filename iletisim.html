    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center mb-4">Benimle İletişime Geçin</h1>
                <p class="text-center text-muted mb-5">Projeler, işbirlikleri veya sadece sohbet etmek için aşağıdaki formu doldurabilirsiniz.</p>

                <div class="card shadow-sm border-0 p-4">
                    <form id="iletisimFormu" action="islem.php" method="POST">
                        
                        <div class="mb-3">
                            <label for="isim" class="form-label">Adınız Soyadınız *</label>
                            <input type="text" class="form-control" id="isim" name="isim" placeholder="Örn: Efe Ersoy">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta Adresiniz *</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="ornek@sakarya.edu.tr">
                        </div>

                        <div class="mb-3">
                            <label for="konu" class="form-label">Konu *</label>
                            <select class="form-select" id="konu" name="konu">
                                <option value="" selected disabled>Lütfen bir konu seçin...</option>
                                <option value="Yazılım Geliştirme">Yazılım Geliştirme</option>
                                <option value="Staj / İş Başvurusu">Staj / İş Başvurusu</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Cinsiyetiniz</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="belirtmek_istemiyorum" value="Belirtmek İstemiyorum">
                                <label class="form-check-label" for="belirtmek_istemiyorum">Belirtmek İstemiyorum</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="mesaj" class="form-label">Mesajınız *</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı buraya yazın..."></textarea>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="onay" name="onay">
                            <label class="form-check-label text-muted" for="onay">Verilerimin işlenmesini okudum ve kabul ediyorum. *</label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="button" id="btn-temizle" class="btn btn-secondary me-md-2">Formu Temizle</button>
                            <button type="button" id="btn-gonder-native" class="btn btn-primary">Gönder (Native JS)</button>
                            <button type="button" id="btn-gonder-vue" class="btn btn-success">Gönder (Vue.js)</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
